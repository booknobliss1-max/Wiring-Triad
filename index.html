<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Two Tabs Side by Side</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* prevent outer page scroll */
      font-family: sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .pane {
      flex: 1;
      border: 1px solid #ccc;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .pane-header {
      padding: 8px 10px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pane iframe {
      border: none;
      width: 100%;
      height: 100%;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left tab -->
    <div class="pane">
      <div class="pane-header">
        The Wiring Triad: Creativity, Power, and Grounding in Society
      </div>
      <iframe
        src="<!-- put the first tab URL here, e.g. https://example.com -->">
      </iframe>
    </div>

    <!-- Right tab -->
    <div class="pane">
      <div class="pane-header">
        The Wiring Triad — Creativity, Power, and Grounding in Society (Local)
      </div>
      <iframe
        src="file:///C:/Users/Fort%20Worth%20Mudpies/OneDrive/Desktop/Triad-3.html">
      </iframe>
    </div>
  </div>
</body>
</html>
